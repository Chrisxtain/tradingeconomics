<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 14px;
      color: #333;
    }

    .hidden {
      display: none;
    }

    .section {
      margin-bottom: 14px;
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      padding: 12px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 8px 0 4px 0;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 14px;
    }

    input, select {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      background: #21a364;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #f3f3f3;
      color: #333;
      border: 1px solid #ddd;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>

<div id="setupView" class="hidden">

    <label for="apiKeyInput">API Key</label>
    <input id="apiKeyInput" type="password" placeholder="Enter your Trading Economics API key">
    <button id="saveKeyBtn">Continue</button>
  </div>
</div>

<div id="appView" class="hidden">

    <label for="categorySelect">Category</label>

      <option value="worldbank">World Bank</option>
      <option value="fred">Federal Reserve</option>
    </select>

    <label for="actionSelect">Action</label>
    <select id="actionSelect"></select>
  </div>

  <div class="section">
    <div id="fields"></div>
    <button id="runBtn">Insert Data</button>
  </div>
</div>

<div id="settingsView" class="hidden">
  <h2>Settings</h2>
  <div class="section">
    <label for="newApiKeyInput">API Key</label>
    <input id="newApiKeyInput" type="password" placeholder="Enter new API key">
    <button id="updateKeyBtn">Save</button>
    <button id="removeKeyBtn" class="secondary">Remove Key</button>

</div>

const FIELD_LABELS = {
  country: 'Country',
  indicator: 'Indicator',
  ticker: 'Ticker',
  symbol: 'Symbol',
  group: 'Group',
  category: 'Category',
  startDate: 'Start Date',
  endDate: 'End Date',
  fromDateTime: 'From Datetime',
  toDateTime: 'To Datetime',
  calendarId: 'Calendar ID',
  startIndex: 'Start Index',
  listSize: 'List Size',
  seriesCode: 'Series Code',
  state: 'State / Series'
};

function $(id) {
  return document.getElementById(id);
}

function show(viewId) {
  $('setupView').classList.add('hidden');
  $('appView').classList.add('hidden');
  $('settingsView').classList.add('hidden');
  $(viewId).classList.remove('hidden');
}

function renderActions() {
  const category = $('categorySelect').value;
  const actionSelect = $('actionSelect');
  actionSelect.innerHTML = '';

  ACTIONS[category].forEach(function (action, index) {
    const option = document.createElement('option');
    option.value = index;
    option.textContent = action.label;
    actionSelect.appendChild(option);
  });

  renderFields();
}

function renderFields() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const fieldsDiv = $('fields');
  fieldsDiv.innerHTML = '';

  (action.fields || []).forEach(function (field) {
    const label = document.createElement('label');
    label.textContent = FIELD_LABELS[field] || field;
    fieldsDiv.appendChild(label);

    const input = document.createElement('input');
    input.id = 'field_' + field;

    if (field === 'startDate' || field === 'endDate') {
      input.type = 'date';
    } else if (field === 'fromDateTime' || field === 'toDateTime') {
      input.type = 'datetime-local';
    } else if (field === 'startIndex' || field === 'listSize') {
      input.type = 'number';
    } else {
      input.type = 'text';
    }

    fieldsDiv.appendChild(input);
  });
}

function getFieldValues() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const values = {};

  (action.fields || []).forEach(function (field) {
    values[field] = $('field_' + field).value.trim();
  });

  return values;
}

function runSelectedAction() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const values = getFieldValues();

  if (action.fields) {
    for (const f of action.fields) {
      if (!values[f]) {
        alert('Please fill: ' + FIELD_LABELS[f]);
        return;
      }
    }
  }

  const path = action.build(values);

  google.script.run
    .withSuccessHandler(function () {})
    .withFailureHandler(function (err) {
      alert(err.message);
    })
    .runApiRequest(path);
}

function saveFirstKey() {
  const key = $('apiKeyInput').value.trim();

  google.script.run
    .withSuccessHandler(function () {
      if (INITIAL_STATE.view === 'settings') {
        show('settingsView');
        return;
      }

      show('appView');
      renderActions();

      if (INITIAL_STATE.category && ACTIONS[INITIAL_STATE.category]) {
        $('categorySelect').value = INITIAL_STATE.category;
        renderActions();
      }
    })
    .withFailureHandler(function (err) {
      alert(err.message);
    })
    .saveApiKey(key);
}

function updateKey() {
  const key = $('newApiKeyInput').value.trim();

  google.script.run
    .withSuccessHandler(function () {})
    .withFailureHandler(function (err) {
      alert(err.message);
    })
    .saveApiKey(key);
}

function removeKey() {
  google.script.run
    .withSuccessHandler(function () {
      show('setupView');
    })
    .withFailureHandler(function (err) {
      alert(err.message);
    })
    .clearApiKey();
}

function initialize() {
  google.script.run
    .withSuccessHandler(function (state) {
      if (!state.hasApiKey) {
        show('setupView');
        return;
      }

      if (INITIAL_STATE.view === 'settings') {
        show('settingsView');
        return;
      }

      show('appView');
      renderActions();

      if (INITIAL_STATE.category && ACTIONS[INITIAL_STATE.category]) {
        $('categorySelect').value = INITIAL_STATE.category;
        renderActions();
      }
    })
    .withFailureHandler(function (err) {
      alert(err.message);
    })
    .getAppState();
}

$('categorySelect').addEventListener('change', renderActions);
$('actionSelect').addEventListener('change', renderFields);
$('runBtn').addEventListener('click', runSelectedAction);
$('saveKeyBtn').addEventListener('click', saveFirstKey);
$('updateKeyBtn').addEventListener('click', updateKey);
$('removeKeyBtn').addEventListener('click', removeKey);

initialize();
</script>
